<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Heyst Admin</title>
        <link href="./assets/css/common.css" rel="stylesheet">
        <link href="./assets/css/common_responsive.css" rel="stylesheet">
        <link href="./assets/css/style.css" rel="stylesheet">
        <link href="./assets/css/responsive.css" rel="stylesheet">
        <link href="./assets/icon/favicon.ico" rel="shortcut icon" type="image/x-icon">
    </head>
    <body>
        <form action="" autocomplete="off" class="box-full" onkeypress="return enterBrakey(event)">
            <section class="box-item login_box">
                <h2>HEYST ADMIN</h2>
                <article class="form-box">
                    <div class="form-item">
                        <input type="text" value="admin001">
                        <label>아이디</label>
                    </div>
                    <div class="form-item">
                        <input type="password" value="test212345">
                        <label>비밀번호</label>
                    </div>
                    <button type="button" class="btn">로그인</button>
                </article>
            </section><!--//login_box-->
        </form>
    </body>

    <script src="./assets/js/jquery-3.6.4.min.js"></script>
    <script src="./assets/js/jquery-migrate-1.4.1.min.js"></script>
    <script src="./assets/js/common.js"></script>
    <script>
        $(function(){
            //입력란 체크
            $(".login_box .btn").on("click", function() {
                var is_val = true;
                $(".form-item > input").each(function(){
                    if($(this).val().trim() == "") {
                        if($(this).attr("type") == "text") {
                            gateTxt = "아이디를 입력해 주세요."
                            confirmGate(gateTxt);
                            return is_val = false;
                        } else if($(this).attr("type") == "password") {
                            gateTxt = "비밀번호를 입력해 주세요."
                            confirmGate(gateTxt);
                            return is_val = false;
                        }
                    }
                });
                if(is_val) {
                    loadingShow();
                    setTimeout(() => {
                        $(location).attr("href", "./main.html");
                    }, 2000);
                }
            });
        });
    </script>
</html>
