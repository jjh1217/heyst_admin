        <form action="" autocomplete="off" class="box-wrap" onkeypress="return enterBrakey(event)">
            <h2 class="box-tit">민팅 캘린더 관리</h2>
            <main class="form-wrap">
                <section class="form-file">
                    <div class="view on">
                        <p>컬렉션 이미지</p>
                        <img src="./assets/img/item1.png" alt="NFT">
                    </div>
                    <input type="file" id="fileImg">
                    <label for="fileImg">이미지 설정</label>
                </section>
                <section class="form-box">
                    <article class="form-chk single forq">
                        <h3>인증 여부</h3>
                        <ul class="vowel">
                            <li class="item">
                                <input type="checkbox" id="cert_1" checked>
                                <label for="cert_1">인증</label>
                            </li>
                            <li class="item">
                                <input type="checkbox" id="cert_2">
                                <label for="cert_2">미인증</label>
                            </li>
                        </ul>
                    </article>
                    <article class="form-chk single forq">
                        <h3>공개 여부</h3>
                        <ul class="vowel">
                            <li class="item">
                                <input type="checkbox" id="open_1">
                                <label for="open_1">공개</label>
                            </li>
                            <li class="item">
                                <input type="checkbox" id="open_2" checked>
                                <label for="open_2">미공개</label>
                            </li>
                        </ul>
                    </article>
                    <article class="form-item forq">
                        <input type="text" value="Good test Monday">
                        <label>컬렉션</label>
                    </article>
                    <article class="form-item forq">
                        <input type="date" value="2022-12-28">
                        <label>민팅 일자</label>
                    </article>
                    <article class="form-item forq">
                        <input type="text" placeholder="00 : 00" value="14:47">
                        <label>민팅 시간</label>
                    </article>
                    <article class="form-chk single forq">
                        <h3>네트워크</h3>
                        <ul class="vowel">
                            <li class="item">
                                <input type="checkbox" id="net_1">
                                <label for="net_1">이더리움</label>
                            </li>
                            <li class="item">
                                <input type="checkbox" id="net_2" checked>
                                <label for="net_2">솔라나</label>
                            </li>
                            <li class="item">
                                <input type="checkbox" id="net_3">
                                <label for="net_3">클레이튼</label>
                            </li>
                        </ul>
                    </article>
                    <h3 class="form-sTit">SNS</h3>
                    <article class="form-item forq">
                        <input type="text" value="https://twitter.com/">
                        <label>트위터</label>
                        <p class="txt">트위터 주소를 입력해 주세요.</p>
                    </article>
                    <article class="form-item">
                        <input type="text">
                        <label>디스코드</label>
                    </article>
                    <article class="form-item">
                        <input type="text">
                        <label>웹사이트</label>
                    </article>
                    <article class="form-item">
                        <input type="text">
                        <label>미디움</label>
                    </article>
                </section><!--//form-box-->
                <section class="form-btn btn-half">
                    <span class="btn confirm-open tMint_ok">저장</span>
                    <span class="btn light">목록</span>
                </section><!--//btn-half-->
            </main><!--//form-wrap-->
        </form><!--//box-wrap-->
